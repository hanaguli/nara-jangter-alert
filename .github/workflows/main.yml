name: nara-jangter-alert

on:
  schedule:
    - cron: '0 5 * * 1-5'
  workflow_dispatch:

jobs:
  alert:
    runs-on: ubuntu-latest
    steps:
      - run: pip install requests
      - run: python3 << 'EOF'
import requests, json, os, smtplib, sys
from datetime import datetime, timedelta
from email.mime.text import MIMEText
from email.mime.multipart import MIMEMultipart
import ssl

SERVICE_KEY = "${{ secrets.SERVICE_KEY }}"
EMAIL_FROM = "${{ secrets.EMAIL_FROM }}"
EMAIL_PASSWORD = "${{ secrets.EMAIL_PASSWORD }}"
EMAIL_TO = "${{ secrets.EMAIL_TO }}"
KEYWORDS = ["모듈", "임시교사"]
EXCLUDE_KEYWORDS = ["토목공사", "기계공사", "전기공사", "통신공사"]

end_date = datetime.now()
start_date = end_date - timedelta(days=3)
start_str = start_date.strftime('%Y%m%d0000')
end_str = end_date.strftime('%Y%m%d2359')

url = "https://apis.data.go.kr/1230000/ad/BidPublicInfoService/getBidPblancListInfoCnstwk"
params = {
    'serviceKey': SERVICE_KEY,
    'numOfRows': '500',
    'pageNo': '1',
    'inqryDiv': '1',
    'inqryBgnDt': start_str,
    'inqryEndDt': end_str,
    'type': 'json'
}

response = requests.get(url, params=params)
data = response.json()
items = data.get('body', {}).get('items', {}).get('item', [])
if not isinstance(items, list): items = [items] if items else []

matched = [i for i in items if any(k in i.get('bidNtceNm', '') for k in KEYWORDS)]
matched = [i for i in matched if not any(k in i.get('bidNtceNm', '') for k in EXCLUDE_KEYWORDS)]

if matched:
    body = '\n\n'.join([f"[{idx}번] 모듈입찰 공고\n{'='*60}\n공고명: {i.get('bidNtceNm', '')}\n공고번호: {i.get('bidNtceNo', '')}\n발주기관: {i.get('ntceInsttNm', '')}\n공고일자: {i.get('bidNtceDt', '')}\n입찰마감: {i.get('bidClseDt', '')}" for idx, i in enumerate(matched, 1)])
    
    msg = MIMEMultipart()
    msg['From'] = EMAIL_FROM
    msg['To'] = EMAIL_TO
    msg['Subject'] = f"[나라장터 알림] 모듈입찰 신규 공고 {len(matched)}건"
    msg.attach(MIMEText(body, 'plain', 'utf-8'))
    
    context = ssl.create_default_context()
    with smtplib.SMTP_SSL('smtp.gmail.com', 465, context=context) as server:
        server.login(EMAIL_FROM, EMAIL_PASSWORD)
        server.sendmail(EMAIL_FROM, EMAIL_TO, msg.as_string())
    print(f"✅ {len(matched)}건의 공고 이메일 발송 완료")
else:
    print("ℹ️ 신규 공고 없음")
EOF
